<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Trading Game</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
<aside class="side-nav">
  <h2>Invest game</h2>
  <button id="navTrading" class="nav-btn active" onclick="openTrading()">📈 Trading</button>
  <button id="navRealEstate" class="nav-btn" onclick="openRealEstate()">🏠 Nemovitosti</button>
  <button id="navLoans" class="nav-btn" onclick="openLoans()">💳 Půjčky</button>
</aside>

<div class="app-shell">
<aside class="card assets-sidebar">
  <h3>Všechny akcie</h3>
  <div id="assetsSidebar"></div>
</aside>

<main class="app">
  <header class="app-header">
    <h1>Invest Game</h1>
  </header>

  <section class="top-summary">
    <div class="card balance-hero">
      <img src="money.svg" alt="Peníze" class="money-icon">
      <div>
        <p class="balance-hero-label">Volné prostředky</p>
        <p class="balance-hero-value"><span id="balance"></span></p>
      </div>
    </div>

    <div class="card account-inline">
      <h3>Stav účtu</h3>
      <p>Investováno: <span id="invested"></span></p>
      <p>Unrealized: <span id="unrealized"></span></p>
      <p>Total: <span id="total"></span></p>
    </div>
  </section>

  <section class="card controls-card">
    <div class="toolbar">
      <button onclick="setSpeed(0)">⏸ Pause</button>
      <button onclick="setSpeed(1000)">▶ Play (1×)</button>
      <button onclick="setSpeed(500)">2×</button>
      <button onclick="setSpeed(200)">5×</button>
      <button onclick="openPortfolio()">📊 Portfolio</button>
      <button onclick="openAccountHistory()">📈 Stav účtu</button>
      <button class="danger" onclick="newGame()">🆕 Nová hra</button>
    </div>

    <div class="toolbar">
      <button onclick="exportData()">📥 Exportovat data</button>
      <input type="file" id="importFile" accept=".txt">
      <button onclick="parseImportedDataFromFile()">📤 Načíst data</button>
    </div>
  </section>

  <section class="card indicator-card">
    <strong>Indikátory:</strong>
    <label><input type="checkbox" id="toggleEma20" checked onchange="setIndicatorVisibility()"> EMA 20</label>
    <label><input type="checkbox" id="toggleEma50" checked onchange="setIndicatorVisibility()"> EMA 50</label>
    <label><input type="checkbox" id="toggleRsi" checked onchange="setIndicatorVisibility()"> RSI</label>
  </section>

  <section class="card chart-card">
    <p class="price-line">Cena: <span id="price">100</span></p>
    <div id="chartContainer" style="width:100%; height:500px;">
        <canvas id="chart"></canvas>
    </div>
  </section>

  <section class="card trade-card">
    <div class="input-grid">
      <input type="number" id="sl" placeholder="Stop Loss">
      <input type="number" id="tp" placeholder="Take Profit">
      <input type="number" id="volume" placeholder="Vol (lot)" step="0.01" oninput="calculateCost()">
      <input type="number" id="buyPercent" placeholder="% nákupu" step="0.1" min="0" max="100" oninput="calculateCost()">
    </div>
    <p class="cost-line">Cost: <span id="cost">0</span></p>

    <div class="toolbar">
      <button class="buy-btn" onclick="buy()">BUY</button>
      <button class="sell-btn" onclick="sell()">SELL</button>
    </div>

    <p id="status" class="status"></p>
  </section>

  <section class="card info-card">
    <div>
      <h3>Obchody</h3>
      <div id="trades"></div>
    </div>

    <div>
      <h3>Otevřené pozice (všechny akcie)</h3>
      <div id="globalOpenPositions"></div>
    </div>

  </section>
</main>

<aside class="card dividend-sidebar">
  <h3>Peněžní transakce</h3>
  <div id="transactionHistory"></div>
</aside>
</div>

<section id="portfolioPage" class="portfolio-page hidden">
  <div class="card portfolio-card">
    <div class="portfolio-header">
      <h2>Portfolio</h2>
      <button onclick="closePortfolio()">⬅ Zpět do hry</button>
    </div>
    <canvas id="portfolioChart" width="520" height="520"></canvas>
    <div id="portfolioLegend" class="portfolio-legend"></div>
  </div>
</section>

<section id="accountHistoryPage" class="portfolio-page hidden">
  <div class="card portfolio-card">
    <div class="portfolio-header">
      <h2>Stav účtu v čase</h2>
      <button onclick="closeAccountHistory()">⬅ Zpět do hry</button>
    </div>
    <canvas id="accountHistoryChart" width="960" height="500"></canvas>
    <div id="accountHistoryLegend" class="portfolio-legend"></div>
  </div>
</section>

<section id="realEstatePage" class="portfolio-page hidden">
  <div class="card portfolio-card">
    <div class="portfolio-header">
      <h2>Nemovitosti</h2>
      <button onclick="openTrading()">⬅ Zpět na Trading</button>
    </div>
    <div id="realEstateGrid" class="realestate-grid"></div>
  </div>
</section>

<section id="loansPage" class="portfolio-page hidden">
  <div class="card portfolio-card">
    <div class="portfolio-header">
      <h2>Půjčky</h2>
      <button onclick="openTrading()">⬅ Zpět na Trading</button>
    </div>
    <div class="realestate-card">
      <p>Max půjčka: <strong id="loanMaxValue"></strong></p>
      <p>Úrok: <strong>5 %</strong> | Doba: <strong>5 let (60 splátek)</strong></p>
      <input type="number" id="loanAmount" placeholder="Výše půjčky">
      <div class="toolbar">
        <button onclick="borrowLoan()">Půjčit</button>
      </div>
      <div id="loanInfo"></div>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
